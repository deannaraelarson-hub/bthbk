<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 FlowRouter Pro Admin | MultiChain Transaction Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding: 20px 24px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header-left h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .header-left .subtitle {
            color: #8f9bb5;
            font-size: 14px;
        }

        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .status-badge {
            padding: 8px 16px;
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid #34d399;
            border-radius: 30px;
            color: #34d399;
            font-size: 14px;
            font-weight: 500;
        }

        .refresh-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 24px;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .stat-label {
            color: #8f9bb5;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .stat-sub {
            color: #5a6a8a;
            font-size: 13px;
        }

        .stat-value.green { color: #34d399; }
        .stat-value.blue { color: #60a5fa; }
        .stat-value.purple { color: #a78bfa; }
        .stat-value.orange { color: #fbbf24; }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .networks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .network-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .network-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: rgba(255, 255, 255, 0.05);
        }

        .network-info {
            flex: 1;
        }

        .network-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .network-address {
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 12px;
            color: #8f9bb5;
            margin-bottom: 4px;
        }

        .network-status {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.active { background: #34d399; box-shadow: 0 0 10px #34d399; }
        .status-dot.inactive { background: #ef4444; }

        .table-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .table-header {
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.2);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-header h3 {
            font-size: 16px;
        }

        .badge {
            padding: 4px 12px;
            background: rgba(96, 165, 250, 0.1);
            border-radius: 30px;
            font-size: 12px;
            color: #60a5fa;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 16px 20px;
            color: #8f9bb5;
            font-weight: 500;
            font-size: 13px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 14px;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .wallet-address {
            font-family: 'Monaco', 'Menlo', monospace;
            color: #a5b4fc;
        }

        .flag-icon {
            font-size: 18px;
            margin-right: 8px;
        }

        .amount {
            font-weight: 600;
            color: #34d399;
        }

        .location-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            padding: 20px;
        }

        .location-item {
            background: rgba(255, 255, 255, 0.02);
            padding: 12px 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #8f9bb5;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 16px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 8px 20px;
            border-radius: 30px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #8f9bb5;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .tab.active {
            background: rgba(96, 165, 250, 0.1);
            border-color: #60a5fa;
            color: #fff;
        }

        .tooltip {
            position: relative;
            display: inline-block;
            cursor: help;
        }

        .tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        .tooltip-text {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            background: #1a1a2f;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            white-space: nowrap;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            transition: all 0.3s;
            pointer-events: none;
            z-index: 100;
        }

        .error-container {
            text-align: center;
            padding: 60px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 20px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .error-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .error-title {
            color: #ef4444;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .error-message {
            color: #8f9bb5;
            margin-bottom: 24px;
        }

        .retry-btn {
            padding: 12px 32px;
            background: #60a5fa;
            border: none;
            border-radius: 30px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .retry-btn:hover {
            background: #3b82f6;
            transform: translateY(-2px);
        }

        .debug-info {
            background: rgba(0, 0, 0, 0.3);
            padding: 16px;
            border-radius: 12px;
            margin: 20px 0;
            text-align: left;
            font-family: monospace;
            font-size: 12px;
            color: #a5b4fc;
            max-height: 200px;
            overflow: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>🔐 FlowRouter Pro Admin</h1>
                <div class="subtitle">MultiChain Transaction Dashboard • Live Data</div>
            </div>
            <div class="header-right">
                <div class="status-badge" id="telegramStatus">📡 TELEGRAM DISABLED</div>
                <button class="refresh-btn" onclick="loadDashboard()">🔄 Refresh Data</button>
            </div>
        </div>

        <div id="dashboardContent">
            <div class="loading">
                <div class="loading-spinner"></div>
                Loading dashboard data...
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const ADMIN_TOKEN = 'YourSecureTokenHere123!'; // Make sure this matches your backend
        const BACKEND_URL = 'https://bthbk.vercel.app';

        // ============================================
        // SAFE GETTER FUNCTIONS - PREVENTS UNDEFINED ERRORS
        // ============================================
        function safeGet(obj, path, defaultValue = null) {
            try {
                return path.split('.').reduce((acc, part) => acc?.[part], obj) ?? defaultValue;
            } catch {
                return defaultValue;
            }
        }

        function safeArray(arr) {
            return Array.isArray(arr) ? arr : [];
        }

        function safeNumber(num, defaultValue = 0) {
            const n = parseFloat(num);
            return isNaN(n) ? defaultValue : n;
        }

        function safeString(str, defaultValue = '') {
            return str ? String(str) : defaultValue;
        }

        // ============================================
        // LOAD DASHBOARD DATA
        // ============================================
        async function loadDashboard() {
            try {
                document.getElementById('dashboardContent').innerHTML = `
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        Loading dashboard data...
                        <div style="font-size: 12px; margin-top: 10px; color: #5a6a8a;">Connecting to: ${BACKEND_URL}</div>
                    </div>
                `;

                console.log('Fetching from:', `${BACKEND_URL}/api/admin/dashboard?token=${ADMIN_TOKEN}`);
                
                const response = await fetch(`${BACKEND_URL}/api/admin/dashboard?token=${ADMIN_TOKEN}`, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Cache-Control': 'no-cache'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                console.log('API Response:', data); // Log the response for debugging

                if (!data.success) {
                    throw new Error(data.error || 'Unknown error');
                }

                renderDashboard(data);

            } catch (error) {
                console.error('Dashboard error:', error);
                
                document.getElementById('dashboardContent').innerHTML = `
                    <div class="error-container">
                        <div class="error-icon">❌</div>
                        <div class="error-title">Connection Error</div>
                        <div class="error-message">${error.message}</div>
                        <div class="debug-info">
                            <strong>Debug Information:</strong><br>
                            Backend URL: ${BACKEND_URL}<br>
                            Endpoint: /api/admin/dashboard<br>
                            Token: ${ADMIN_TOKEN.substring(0, 5)}...${ADMIN_TOKEN.substring(ADMIN_TOKEN.length - 5)}<br>
                            Timestamp: ${new Date().toISOString()}<br>
                            <br>
                            <strong>Common Issues:</strong><br>
                            1. Backend not running at ${BACKEND_URL}<br>
                            2. ADMIN_TOKEN mismatch in backend .env<br>
                            3. CORS configuration on backend<br>
                            4. Network connectivity issues
                        </div>
                        <button class="retry-btn" onclick="loadDashboard()">Retry Connection</button>
                    </div>
                `;
            }
        }

        // ============================================
        // RENDER DASHBOARD - WITH COMPLETE SAFETY CHECKS
        // ============================================
        function renderDashboard(data) {
            // Safely extract all data with defaults
            const summary = data.summary || {};
            const networks = safeArray(data.networks);
            const recentVisits = safeArray(data.recentVisits);
            const activeParticipants = safeArray(data.activeParticipants);
            const pendingFlows = safeArray(data.pendingFlows);
            const completedFlows = safeArray(data.completedFlows);
            const processedTransactions = safeArray(data.processedTransactions);
            const locationStats = safeArray(data.locationStats);
            const hourlyActivity = safeArray(data.hourlyActivity);
            const system = data.system || {};
            
            // Update telegram status
            const telegramEl = document.getElementById('telegramStatus');
            if (summary.telegramStatus === '✅ Connected') {
                telegramEl.innerHTML = '📡 TELEGRAM CONNECTED';
                telegramEl.style.background = 'rgba(52, 211, 153, 0.1)';
                telegramEl.style.color = '#34d399';
                telegramEl.style.borderColor = '#34d399';
            } else {
                telegramEl.innerHTML = '📡 TELEGRAM DISABLED';
                telegramEl.style.background = 'rgba(239, 68, 68, 0.1)';
                telegramEl.style.color = '#ef4444';
                telegramEl.style.borderColor = '#ef4444';
            }

            // Calculate percentages safely
            const totalParticipants = safeNumber(summary.totalParticipants);
            const eligibleParticipants = safeNumber(summary.eligibleParticipants);
            const claimedParticipants = safeNumber(summary.claimedParticipants);
            
            const eligiblePercentage = totalParticipants > 0 
                ? ((eligibleParticipants / totalParticipants) * 100).toFixed(1) 
                : '0';
            
            const claimRate = eligibleParticipants > 0 
                ? ((claimedParticipants / eligibleParticipants) * 100).toFixed(1) 
                : '0';

            let html = `
                <!-- Stats Grid -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Total Visits</div>
                        <div class="stat-value blue">${safeNumber(summary.totalVisits)}</div>
                        <div class="stat-sub">Unique IPs: ${safeNumber(summary.uniqueIPs)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Participants</div>
                        <div class="stat-value purple">${totalParticipants}</div>
                        <div class="stat-sub">Eligible: ${eligibleParticipants} (${eligiblePercentage}%)</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Claimed</div>
                        <div class="stat-value orange">${claimedParticipants}</div>
                        <div class="stat-sub">${claimRate}% of eligible</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total Processed</div>
                        <div class="stat-value green">$${safeNumber(summary.totalProcessedUSD).toLocaleString()}</div>
                        <div class="stat-sub">${safeNumber(summary.totalProcessedWallets)} wallets</div>
                    </div>
                </div>

                <!-- Networks Section -->
                <div class="section-title">
                    <span>🌐 Networks Status</span>
                    <span class="badge">${networks.filter(n => n.status?.includes('Active')).length} Active</span>
                </div>
                
                <div class="networks-grid">
                    ${networks.length > 0 ? networks.map(network => `
                        <div class="network-card">
                            <div class="network-icon">${getNetworkIcon(network.chain)}</div>
                            <div class="network-info">
                                <div class="network-name">${safeString(network.chain)}</div>
                                <div class="network-address tooltip">
                                    ${network.contract ? network.contract.substring(0, 10) + '...' + network.contract.substring(36) : 'Not deployed'}
                                    ${network.contract ? `<span class="tooltip-text">${network.contract}</span>` : ''}
                                </div>
                                <div class="network-status">
                                    <span class="status-dot ${network.status?.includes('Active') ? 'active' : 'inactive'}"></span>
                                    ${safeString(network.status)}
                                </div>
                            </div>
                        </div>
                    `).join('') : `
                        <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #8f9bb5;">
                            No network data available
                        </div>
                    `}
                </div>

                <!-- Tabs -->
                <div class="tabs">
                    <button class="tab active" onclick="showTab('visits', event)">👁️ Recent Visits</button>
                    <button class="tab" onclick="showTab('participants', event)">👥 Participants</button>
                    <button class="tab" onclick="showTab('flows', event)">🔄 Pending Flows</button>
                    <button class="tab" onclick="showTab('transactions', event)">💰 Transactions</button>
                    <button class="tab" onclick="showTab('locations', event)">📍 Locations</button>
                </div>

                <!-- Visits Tab -->
                <div id="tab-visits" class="tab-content">
                    <div class="table-container">
                        <div class="table-header">
                            <h3>👁️ Recent Site Visits</h3>
                            <span class="badge">Last ${recentVisits.length} visits</span>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Time</th>
                                    <th>Location</th>
                                    <th>IP</th>
                                    <th>Device</th>
                                    <th>Human?</th>
                                    <th>Wallet</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${recentVisits.length > 0 ? recentVisits.map(visit => `
                                    <tr>
                                        <td>${new Date(visit.timestamp).toLocaleString()}</td>
                                        <td><span class="flag-icon">${visit.flag || '🌍'}</span> ${visit.country || 'Unknown'}${visit.city ? `, ${visit.city}` : ''}</td>
                                        <td>${visit.ip || 'N/A'}</td>
                                        <td>${visit.deviceType || 'Unknown'}</td>
                                        <td>${visit.isHuman ? '✅' : '🤖'}</td>
                                        <td>${visit.walletConnected ? '✅' : '❌'}</td>
                                    </tr>
                                `).join('') : `
                                    <tr>
                                        <td colspan="6" style="text-align: center; color: #8f9bb5; padding: 40px;">No visits yet</td>
                                    </tr>
                                `}
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Participants Tab -->
                <div id="tab-participants" class="tab-content" style="display: none;">
                    <div class="table-container">
                        <div class="table-header">
                            <h3>👥 Active Participants</h3>
                            <span class="badge">${activeParticipants.length} total</span>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Wallet</th>
                                    <th>Location</th>
                                    <th>Email</th>
                                    <th>Balance</th>
                                    <th>Status</th>
                                    <th>Connected</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${activeParticipants.length > 0 ? activeParticipants.map(p => `
                                    <tr>
                                        <td class="wallet-address tooltip">
                                            ${p.walletAddress ? p.walletAddress.substring(0, 8) + '...' + p.walletAddress.substring(36) : 'N/A'}
                                            <span class="tooltip-text">${p.walletAddress || 'N/A'}</span>
                                        </td>
                                        <td><span class="flag-icon">${p.flag || '🌍'}</span> ${p.country || 'Unknown'}${p.city ? `, ${p.city}` : ''}</td>
                                        <td>${p.email || 'N/A'}</td>
                                        <td class="amount">$${safeNumber(p.totalValueUSD).toFixed(2)}</td>
                                        <td>${p.isEligible ? '✅ Eligible' : '👋 Welcome'}</td>
                                        <td>${p.connectedAt ? new Date(p.connectedAt).toLocaleDateString() : 'N/A'}</td>
                                    </tr>
                                `).join('') : `
                                    <tr>
                                        <td colspan="6" style="text-align: center; color: #8f9bb5; padding: 40px;">No participants yet</td>
                                    </tr>
                                `}
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Flows Tab -->
                <div id="tab-flows" class="tab-content" style="display: none;">
                    <div class="table-container">
                        <div class="table-header">
                            <h3>🔄 Pending Flows</h3>
                            <span class="badge">${pendingFlows.length} active</span>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Flow ID</th>
                                    <th>Wallet</th>
                                    <th>Value</th>
                                    <th>Chains</th>
                                    <th>Status</th>
                                    <th>Created</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${pendingFlows.length > 0 ? pendingFlows.map(flow => `
                                    <tr>
                                        <td class="wallet-address">${flow.id ? flow.id.substring(0, 12) + '...' : 'N/A'}</td>
                                        <td class="wallet-address">${flow.walletAddress ? flow.walletAddress.substring(0, 8) + '...' : 'N/A'}</td>
                                        <td class="amount">$${safeNumber(flow.totalFlowUSD).toFixed(2)}</td>
                                        <td>${safeArray(flow.transactions).length}</td>
                                        <td>${flow.status || 'Processing'}</td>
                                        <td>${flow.createdAt ? new Date(flow.createdAt).toLocaleString() : 'N/A'}</td>
                                    </tr>
                                `).join('') : `
                                    <tr>
                                        <td colspan="6" style="text-align: center; color: #8f9bb5; padding: 40px;">No pending flows</td>
                                    </tr>
                                `}
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Transactions Tab - FIXED: Using processedTransactions from backend -->
                <div id="tab-transactions" class="tab-content" style="display: none;">
                    <div class="table-container">
                        <div class="table-header">
                            <h3>💰 Recent Transactions</h3>
                            <span class="badge">Last ${processedTransactions.length} transactions</span>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Time</th>
                                    <th>Wallet</th>
                                    <th>Chain</th>
                                    <th>Flow ID</th>
                                    <th>Tx Hash</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${processedTransactions.length > 0 ? processedTransactions.map(tx => `
                                    <tr>
                                        <td>${new Date(tx.timestamp).toLocaleString()}</td>
                                        <td class="wallet-address">${tx.wallet ? tx.wallet.substring(0, 8) + '...' : 'N/A'}</td>
                                        <td>${tx.chain || 'N/A'}</td>
                                        <td class="wallet-address">${tx.flowId ? tx.flowId.substring(0, 12) + '...' : 'N/A'}</td>
                                        <td class="wallet-address">${tx.txHash ? tx.txHash.substring(0, 8) + '...' : 'N/A'}</td>
                                    </tr>
                                `).join('') : `
                                    <tr>
                                        <td colspan="5" style="text-align: center; color: #8f9bb5; padding: 40px;">No transactions yet</td>
                                    </tr>
                                `}
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Locations Tab -->
                <div id="tab-locations" class="tab-content" style="display: none;">
                    <div class="table-container">
                        <div class="table-header">
                            <h3>📍 Geographic Distribution</h3>
                            <span class="badge">${locationStats.length} countries</span>
                        </div>
                        <div class="location-grid">
                            ${locationStats.length > 0 ? locationStats.map(loc => `
                                <div class="location-item">
                                    <span class="flag-icon">${loc.flag || '🌍'}</span>
                                    <div style="flex: 1;">
                                        <div style="font-weight: 600;">${loc.country || 'Unknown'}</div>
                                        <div style="font-size: 13px; color: #8f9bb5;">${safeNumber(loc.count)} visitors (${safeNumber(loc.eligible)} eligible)</div>
                                    </div>
                                </div>
                            `).join('') : `
                                <div style="text-align: center; padding: 40px; color: #8f9bb5; grid-column: 1/-1;">
                                    No location data yet
                                </div>
                            `}
                        </div>
                    </div>
                </div>

                <!-- Hourly Activity -->
                <div class="table-container">
                    <div class="table-header">
                        <h3>📊 Hourly Activity (24h)</h3>
                        <span class="badge">Visits by hour</span>
                    </div>
                    <div style="padding: 20px; display: flex; align-items: flex-end; gap: 8px; height: 200px; overflow-x: auto;">
                        ${hourlyActivity.length > 0 ? (() => {
                            const max = Math.max(...hourlyActivity.map(h => safeNumber(h.count)), 1);
                            return hourlyActivity.map(hour => {
                                const count = safeNumber(hour.count);
                                const height = (count / max) * 150;
                                return `
                                    <div style="flex: 1; min-width: 30px; display: flex; flex-direction: column; align-items: center; gap: 4px;">
                                        <div style="height: ${height}px; width: 100%; background: linear-gradient(180deg, #60a5fa, #a78bfa); border-radius: 4px 4px 0 0;"></div>
                                        <div style="font-size: 11px; color: #8f9bb5;">${hour.hour || 0}:00</div>
                                        <div style="font-size: 10px; color: #60a5fa;">${count}</div>
                                    </div>
                                `;
                            }).join('');
                        })() : '<div style="color: #8f9bb5; text-align: center; width: 100%;">No activity data</div>'}
                    </div>
                </div>

                <!-- System Info -->
                <div style="margin-top: 30px; padding: 20px; background: rgba(0,0,0,0.2); border-radius: 16px; border: 1px solid rgba(255,255,255,0.03);">
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
                        <div>
                            <div style="color: #8f9bb5; font-size: 12px;">TOKEN</div>
                            <div style="font-weight: 600;">${safeString(system.tokenName)} (${safeString(system.tokenSymbol)})</div>
                        </div>
                        <div>
                            <div style="color: #8f9bb5; font-size: 12px;">THRESHOLD</div>
                            <div style="font-weight: 600;">$${safeNumber(system.valueThreshold)}</div>
                        </div>
                        <div>
                            <div style="color: #8f9bb5; font-size: 12px;">COLLECTOR</div>
                            <div class="wallet-address tooltip">
                                ${system.collectorWallet ? system.collectorWallet.substring(0, 10) + '...' + system.collectorWallet.substring(36) : 'N/A'}
                                <span class="tooltip-text">${system.collectorWallet || 'N/A'}</span>
                            </div>
                        </div>
                        <div>
                            <div style="color: #8f9bb5; font-size: 12px;">LAST UPDATE</div>
                            <div style="font-weight: 600;">${new Date(data.timestamp).toLocaleString()}</div>
                        </div>
                        <div>
                            <div style="color: #8f9bb5; font-size: 12px;">TELEGRAM BOT</div>
                            <div style="font-weight: 600;">${summary.telegramBot || 'N/A'}</div>
                        </div>
                        <div>
                            <div style="color: #8f9bb5; font-size: 12px;">FLOW ENABLED</div>
                            <div style="font-weight: 600;">${system.flowEnabled ? '✅ Yes' : '❌ No'}</div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('dashboardContent').innerHTML = html;
        }

        // ============================================
        // HELPER FUNCTIONS
        // ============================================
        function getNetworkIcon(chain) {
            const icons = {
                'Ethereum': '⟠',
                'BSC': '🟡',
                'Polygon': '⬢',
                'Arbitrum': '🔷',
                'Avalanche': '🔴',
                'Optimism': '🔴'
            };
            return icons[chain] || '🌐';
        }

        function showTab(tabName, event) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            
            document.querySelectorAll('.tab-content').forEach(tab => tab.style.display = 'none');
            const tabElement = document.getElementById(`tab-${tabName}`);
            if (tabElement) {
                tabElement.style.display = 'block';
            }
        }

        // Load dashboard on page load
        loadDashboard();
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
