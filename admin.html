<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Debug Admin</title>
    <style>
        body { background: #0a0a0f; color: white; font-family: monospace; padding: 20px; }
        .error { color: #ef4444; }
        .success { color: #34d399; }
        pre { background: #1a1a2e; padding: 20px; border-radius: 8px; overflow: auto; }
    </style>
</head>
<body>
    <h1>🔍 Debug Admin Dashboard</h1>
    <div id="status">Testing connection...</div>
    <div id="result"></div>

    <script>
        const ADMIN_TOKEN = 'YourSecureTokenHere123!';
        const BACKEND_URL = 'https://bthbk.vercel.app';

        async function debugConnection() {
            try {
                // Test 1: Root endpoint
                document.getElementById('status').innerHTML = '📡 Testing root endpoint...';
                const rootRes = await fetch(BACKEND_URL);
                const rootData = await rootRes.json();
                
                // Test 2: Admin endpoint
                document.getElementById('status').innerHTML = '📡 Testing admin endpoint...';
                const adminRes = await fetch(`${BACKEND_URL}/api/admin/dashboard?token=${ADMIN_TOKEN}`);
                const adminData = await adminRes.json();

                // Show results
                document.getElementById('result').innerHTML = `
                    <h2 class="success">✅ Connection Successful</h2>
                    
                    <h3>Root Endpoint Response:</h3>
                    <pre>${JSON.stringify(rootData, null, 2)}</pre>
                    
                    <h3>Admin Endpoint Response:</h3>
                    <pre>${JSON.stringify(adminData, null, 2)}</pre>
                    
                    <h3>Debug Info:</h3>
                    <div style="background: #1a1a2e; padding: 15px; border-radius: 8px;">
                        <p><strong>Backend URL:</strong> ${BACKEND_URL}</p>
                        <p><strong>Admin URL:</strong> ${BACKEND_URL}/api/admin/dashboard?token=${ADMIN_TOKEN}</p>
                        <p><strong>Admin Response Status:</strong> ${adminRes.status}</p>
                        <p><strong>Admin Response OK:</strong> ${adminRes.ok}</p>
                        <p><strong>Admin Success Flag:</strong> ${adminData.success}</p>
                    </div>
                `;

            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <h2 class="error">❌ Connection Error</h2>
                    <pre>${error.message}</pre>
                    <div style="background: #2a1a1a; padding: 15px; border-radius: 8px; margin-top: 20px;">
                        <p><strong>Backend URL:</strong> ${BACKEND_URL}</p>
                        <p><strong>Admin URL:</strong> ${BACKEND_URL}/api/admin/dashboard?token=${ADMIN_TOKEN}</p>
                        <p><strong>Error Type:</strong> ${error.name}</p>
                    </div>
                `;
            }
        }

        debugConnection();
    </script>
</body>
</html>
