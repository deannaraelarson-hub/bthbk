
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowRouter Admin</title>
   <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2f 100%);
            color: #fff;
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header-left h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .header-left .subtitle {
            color: #8f9bb5;
            font-size: 14px;
        }

        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .status-badge {
            padding: 8px 16px;
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid #34d399;
            border-radius: 30px;
            color: #34d399;
            font-size: 14px;
            font-weight: 500;
        }

        .refresh-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 24px;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .stat-label {
            color: #8f9bb5;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .stat-sub {
            color: #5a6a8a;
            font-size: 13px;
        }

        .stat-value.green { color: #34d399; }
        .stat-value.blue { color: #60a5fa; }
        .stat-value.purple { color: #a78bfa; }
        .stat-value.orange { color: #fbbf24; }

        /* Networks Section */
        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .networks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .network-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .network-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .network-info {
            flex: 1;
        }

        .network-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .network-address {
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 12px;
            color: #8f9bb5;
            margin-bottom: 4px;
        }

        .network-status {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.active { background: #34d399; box-shadow: 0 0 10px #34d399; }
        .status-dot.inactive { background: #ef4444; }

        /* Tables */
        .table-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .table-header {
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.2);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-header h3 {
            font-size: 16px;
        }

        .badge {
            padding: 4px 12px;
            background: rgba(96, 165, 250, 0.1);
            border-radius: 30px;
            font-size: 12px;
            color: #60a5fa;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 16px 20px;
            color: #8f9bb5;
            font-weight: 500;
            font-size: 13px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 14px;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .wallet-address {
            font-family: 'Monaco', 'Menlo', monospace;
            color: #a5b4fc;
        }

        .flag-icon {
            font-size: 18px;
            margin-right: 8px;
        }

        .amount {
            font-weight: 600;
            color: #34d399;
        }

        /* Location Grid */
        .location-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            padding: 20px;
        }

        .location-item {
            background: rgba(255, 255, 255, 0.02);
            padding: 12px 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
            color: #8f9bb5;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 16px;
        }

        .tab {
            padding: 8px 20px;
            border-radius: 30px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #8f9bb5;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab.active {
            background: rgba(96, 165, 250, 0.1);
            border-color: #60a5fa;
            color: #fff;
        }

        /* Value Highlight */
        .value-highlight {
            background: linear-gradient(135deg, #34d399, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <h1>🔐 FlowRouter Admin</h1>
                <div class="subtitle">MultiChain Transaction Dashboard</div>
            </div>
            <div class="header-right">
                <div class="status-badge" id="telegramStatus">📡 TELEGRAM DISABLED</div>
                <button class="refresh-btn" onclick="loadDashboard()">🔄 Refresh Data</button>
            </div>
        </div>

        <!-- Main Content -->
        <div id="dashboardContent">
            <div class="loading">
                <div class="loading-spinner"></div>
                Loading dashboard data...
            </div>
        </div>
    </div>

        // IMPORTANT: Change this to your actual admin token
        const ADMIN_TOKEN = 'YourSecureTokenHere123!';
        const BACKEND_URL = 'https://bthbk.vercel.app'; // Your Render backend
        
        async function loadDashboard() {

                document.getElementById('dashboardContent').innerHTML = `
                    <div class="loading">

                    document.getElementById('dashboardContent').innerHTML = `
                        <div style="text-align: center; padding: 60px; background: rgba(239, 68, 68, 0.1); border-radius: 20px;">
                            <div style="font-size: 48px; margin-bottom: 16px;">🔒</div>
                            <h2 style="color: #ef4444;">Unauthorized Access</h2>
                            <p style="color: #8f9bb5;">Invalid admin token</p>
                            <p style="color: #8f9bb5; margin-top: 10px;">Token used: ${ADMIN_TOKEN}</p>
                        </div>
                    `;
                    return;
                }

                renderDashboard(data);

            } catch (error) {
                document.getElementById('dashboardContent').innerHTML = `
                    <div style="text-align: center; padding: 60px; background: rgba(239, 68, 68, 0.1); border-radius: 20px;">
                        <div style="font-size: 48px; margin-bottom: 16px;">❌</div>
                        <h2 style="color: #ef4444;">Connection Error</h2>
                        <p style="color: #8f9bb5;">${error.message}</p>
                        <p style="color: #8f9bb5; margin-top: 10px;">Backend URL: ${BACKEND_URL}</p>
                    </div>
                `;
            }
        }

        function renderDashboard(data) {
            // Copy ALL the renderDashboard function from the previous message
            // ... (keep all the rendering code)
        }

        // Load dashboard on page load
        loadDashboard();

        // Auto refresh every 30 seconds
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
